<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" name="row[title]" type="text" value="{$row.title|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-flag" data-rule="required" class="form-control selectpicker" multiple="" name="row[type][]">
                {volist name='type' id='vo'}
                {if condition="$vo['selected']"}
                <option value="{$vo.id}" selected>{$vo.name}</option>
                {else}
                <option value="{$vo.id}">{$vo.name}</option>
                {/if}
                {/volist}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-price" class="form-control" name="row[price]" type="number" value="{$row.price / 100|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="radio">
                {if condition="$row['status'] == 'normal'"}
                <label for="row[status]">
                    <input id="row[status]" name="row[status]" type="radio" value="normal" checked>
                    正常
                </label>
                <label for="row[status]">
                    <input id="row[status]" name="row[status]" type="radio" value="hidden">
                    隐藏
                </label>
                {else}
                <label for="row[status]">
                    <input id="row[status]" name="row[status]" type="radio" value="normal">
                    正常
                </label>
                <label for="row[status]">
                    <input id="row[status]" name="row[status]" type="radio" value="hidden" checked>
                    隐藏
                </label>
                {/if}
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Public')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="radio">
                {if condition="$row['public'] == 1"}
                <label for="row[public]">
                    <input id="row[public]" name="row[public]" type="radio" value="1" checked>
                    免费
                </label>
                <label for="row[public]">
                    <input id="row[public]" name="row[public]" type="radio" value="0">
                    收费
                </label>
                {else}
                <label for="row[public]">
                    <input id="row[public]" name="row[public]" type="radio" value="1">
                    免费
                </label>
                <label for="row[public]">
                    <input id="row[public]" name="row[public]" type="radio" value="0" checked>
                    收费
                </label>
                {/if}
            </div>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
